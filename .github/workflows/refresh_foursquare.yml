name: Refresh Foursquare Cache

on:
  schedule:
    # First day of every month at 02:00 UTC (23:00 SR previous day)
    - cron: '0 2 1 * *'
  workflow_dispatch:   # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Foursquare fetch
        env:
          FSQ_KEY: ${{ secrets.FSQ_KEY }}
        run: python scripts/fetch_foursquare.py

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add foursquare_cache.json
          git diff --staged --quiet || git commit -m "Refresh Foursquare cache $(date '+%Y-%m-%d')"
          git push
