name: Update Wachtdienst

on:
  schedule:
    # Suriname is UTC-3. We run:
    #   Friday   20:00 SR  = 23:00 UTC
    #   Saturday 08:00 SR  = 11:00 UTC
    #   Sunday   08:00 SR  = 11:00 UTC
    - cron: "0 23 * * 5"   # Friday night
    - cron: "0 11 * * 6"   # Saturday morning
    - cron: "0 11 * * 0"   # Sunday morning
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install beautifulsoup4 --break-system-packages

      - name: Scrape wachtdienst
        run: python scripts/scrape_wachtdienst.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wachtdienst.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "data: update wachtdienst [skip ci]" && git push
