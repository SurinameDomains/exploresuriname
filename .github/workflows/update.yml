name: Update Site

on:
  schedule:
    # Every 30 minutes, 06:00–23:00 SR (09:00–02:00 UTC next day)
    # Keeps news fresh all day and catches CBVS rate posts whenever they land
    - cron: '0,30 9-23 * * *'   # 06:00–20:30 SR
    - cron: '0,30 0-2  * * *'   # 21:00–23:30 SR (next UTC day)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser

      - name: Generate all pages
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html news.html nature.html activities.html restaurants.html hotels.html shopping.html services.html currency.html
          git add listing/
          git diff --staged --quiet || git commit -m "Auto-update $(TZ='America/Paramaribo' date '+%Y-%m-%d %H:%M') SR"
          git push
