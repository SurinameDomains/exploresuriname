name: Update Site

on:
  schedule:
    # Suriname is UTC-3, no DST. CBVS publishes rates at 10:00, 12:30, 15:00 SR.
    # Run ~15 min after each publication on weekdays (Mon-Fri).
    - cron: '15 13 * * 1-5'   # after 10:00 SR (13:00 UTC + 15 min)
    - cron: '45 15 * * 1-5'   # after 12:30 SR (15:30 UTC + 15 min)
    - cron: '15 18 * * 1-5'   # after 15:00 SR (18:00 UTC + 15 min)
    # Weekend: one daily refresh for news and general content
    - cron: '0 14 * * 0,6'    # 11:00 SR on Saturday and Sunday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser

      - name: Generate all pages
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html news.html nature.html activities.html restaurants.html hotels.html shopping.html services.html currency.html
          git diff --staged --quiet || git commit -m "Auto-update $(TZ='America/Paramaribo' date '+%Y-%m-%d %H:%M') SR"
          git push
