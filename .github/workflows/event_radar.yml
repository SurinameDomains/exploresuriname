name: Event Radar

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays 12:00 UTC (~09:00 Paramaribo)
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install feedparser beautifulsoup4
      - run: python scripts/event_radar.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit de-dup state if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/event_radar_seen.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: update event-radar seen state [skip ci]"
            git pull --rebase origin main
            git push
          fi
