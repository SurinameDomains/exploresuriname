name: Event Radar

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays 12:00 UTC (~09:00 Paramaribo)
  workflow_dispatch:

permissions:
  issues: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install feedparser
      - run: python scripts/event_radar.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
